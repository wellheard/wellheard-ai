# Nginx Reverse Proxy for WellHeard AI
# Handles SSL termination + WebSocket upgrades with minimal latency

worker_processes auto;

events {
    worker_connections 2048;
    use epoll;
}

http {
    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;        # Critical: disable Nagle for low latency
    keepalive_timeout  300;
    keepalive_requests 10000;

    # ── Upstream: WellHeard API ─────────────────────────────────
    upstream wellheard {
        least_conn;               # Route to least-loaded instance
        server wellheard:8000;
        keepalive 32;             # Persistent connections to backend
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL (replace with your certs or use Let's Encrypt)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.3;   # TLS 1.3 only: 1 RTT handshake
        ssl_prefer_server_ciphers on;

        # ── API Routes ────────────────────────────────────────────
        location /v1/ {
            proxy_pass http://wellheard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection reuse to backend
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── WebSocket Routes (real-time call events) ──────────────
        location /v1/ws/ {
            proxy_pass http://wellheard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Health Check (no auth required) ───────────────────────
        location /v1/health {
            proxy_pass http://wellheard;
            proxy_set_header Host $host;
        }

        # ── Swagger Docs ──────────────────────────────────────────
        location /docs {
            proxy_pass http://wellheard;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://wellheard;
            proxy_set_header Host $host;
        }
    }
}
