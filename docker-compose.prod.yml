# ═══════════════════════════════════════════════════════════════════
# WellHeard AI — Production Docker Compose
# For deployment on any VPS (Hetzner, DigitalOcean, AWS EC2, etc.)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════
version: "3.8"

services:
  # ── WellHeard API Server ────────────────────────────────────
  wellheard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "443:8000"
    env_file:
      - config/.env
    environment:
      - HV_REDIS_URL=redis://redis:6379/0
      - HV_LIVEKIT_URL=ws://livekit:7880
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: always
    deploy:
      replicas: 2                    # 2 instances for redundancy
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/v1/health'); assert r.status_code==200"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis (State & Session Management) ────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── LiveKit Media Server ──────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"          # WebSocket signaling
      - "7881:7881"          # HTTP API
      - "7882:7882/udp"      # WebRTC media (UDP)
      - "50000-50060:50000-50060/udp"  # ICE candidates
    environment:
      - LIVEKIT_KEYS=${HV_LIVEKIT_API_KEY}:${HV_LIVEKIT_API_SECRET}
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── Nginx Reverse Proxy (SSL termination) ─────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    depends_on:
      - wellheard
    restart: always

volumes:
  redis-data:
