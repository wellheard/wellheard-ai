<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .wellheard-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
      .wellheard-ai { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
      .gradient-wave { filter: drop-shadow(0 2px 4px rgba(27, 79, 114, 0.15)); }
    </style>

    <!-- Gradient definitions -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4F72;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86C1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1B4F72;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon Container -->
  <g>
    <!-- Main circle background with subtle gradient -->
    <circle cx="32" cy="40" r="28" fill="url(#blueGradient)" opacity="0.1" />

    <!-- Microphone symbol with wave concept -->
    <!-- Wave lines (sound waves) - left side -->
    <g class="gradient-wave" stroke="url(#waveGradient)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer wave -->
      <path d="M 12 40 Q 14 32, 16 40 Q 18 48, 20 40" opacity="0.6" />
      <!-- Mid wave -->
      <path d="M 8 40 Q 9 28, 12 40 Q 15 52, 18 40" opacity="0.4" />
    </g>

    <!-- Microphone capsule -->
    <g>
      <!-- Capsule body -->
      <rect x="26" y="28" width="12" height="18" rx="3" ry="3" fill="url(#blueGradient)" />

      <!-- Capsule highlight -->
      <rect x="26.5" y="28.5" width="5" height="17" rx="2.5" ry="2.5" fill="white" opacity="0.25" />

      <!-- Microphone stand -->
      <rect x="30" y="47" width="4" height="8" rx="2" ry="2" fill="url(#blueGradient)" />
    </g>

    <!-- Right side accent wave -->
    <g class="gradient-wave" stroke="#2E86C1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 44 40 Q 46 32, 48 40 Q 50 48, 52 40" opacity="0.7" />
      <path d="M 48 40 Q 50 28, 52 40 Q 54 52, 56 40" opacity="0.45" />
    </g>
  </g>

  <!-- Text Section -->
  <g>
    <!-- "WellHeard" text -->
    <text x="68" y="52" class="wellheard-text" fill="#1B4F72">WellHeard</text>

    <!-- "AI" accent -->
    <text x="218" y="35" class="wellheard-ai" fill="#2E86C1" letter-spacing="2">AI</text>

    <!-- Subtle underline accent under "WellHeard" -->
    <line x1="68" y1="58" x2="160" y2="58" stroke="url(#blueGradient)" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>