version: "3.8"

services:
  wellheard:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    depends_on:
      - redis
      - livekit
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"    # WebSocket
      - "7881:7881"    # HTTP
      - "7882:7882/udp"  # WebRTC/UDP
    environment:
      - LIVEKIT_KEYS=devkey:secret
    command: --dev
    restart: unless-stopped

volumes:
  redis-data:
